<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Book Management Dashboard</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased">

    <div class="min-h-screen flex flex-col">

        <main class="flex-1 flex flex-col bg-slate-50">

            <!-- Header -->
            <header class="h-16 bg-white border-b flex items-center justify-between px-8">
                <h1 class="text-xl font-bold">Book Inventory</h1>

                <a href="{% url 'create_book' %}">
                    <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">
                        Add New Book
                    </button>
                </a>
            </header>

            <div class="p-8 max-w-7xl mx-auto w-full">

                <!-- Table -->
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">

                    <div class="overflow-x-auto">

                        <table class="w-full text-left border-collapse">

                            <thead>
                                <tr class="bg-slate-50 border-b">
                                    <th class="px-6 py-4 text-xs font-semibold uppercase">Book</th>
                                    <th class="px-6 py-4 text-xs font-semibold uppercase">Author</th>
                                    <th class="px-6 py-4 text-xs font-semibold uppercase">Status</th>
                                    <th class="px-6 py-4 text-xs font-semibold uppercase text-right">Actions</th>
                                </tr>
                            </thead>

                            <tbody class="divide-y divide-slate-100">

                                {% for book in books %}

                                <tr class="hover:bg-slate-50">

                                    <!-- BOOK COLUMN -->
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-3">

                                            <!-- ✅ COVER IMAGE -->
                                            {% if book.image_url %}
                                            <img src="{{ book.image_url }}"
                                                class="w-10 h-14 object-cover rounded shadow-sm" />
                                            {% else %}
                                            <img src="https://via.placeholder.com/80x120?text=No+Cover"
                                                class="w-10 h-14 object-cover rounded" />
                                            {% endif %}

                                            <!-- BOOK INFO -->
                                            <div>
                                                <div class="text-sm font-bold">
                                                    {{ book.title }}
                                                </div>
                                                <div class="text-xs text-slate-500">
                                                    ID: {{ book.id }}
                                                </div>
                                            </div>

                                        </div>
                                    </td>

                                    <!-- AUTHOR -->
                                    <td class="px-6 py-4 text-sm">
                                        {{ book.author }}
                                    </td>

                                    <!-- STATUS -->
                                    <td class="px-6 py-4">
                                        <span
                                            class="inline-flex items-center px-2 py-1 rounded-full text-xs bg-emerald-100 text-emerald-800">
                                            Active
                                        </span>
                                    </td>

                                    <!-- ACTIONS -->
                                    <td class="px-6 py-4 text-right">
                                        <div class="flex justify-end gap-2">

                                            <!-- Edit Button -->
                                            <a href="#">
                                                <button class="p-2 text-indigo-600 hover:bg-indigo-50 rounded">
                                                    <svg class="w-5 h-5" fill="none" stroke="currentColor"
                                                        viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2"
                                                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5M18.5 3.5a2.121 2.121 0 113 3L12 16l-4 1 1-4 9.5-9.5z" />
                                                    </svg>
                                                </button>
                                            </a>

                                            <!-- Delete Button -->
                                            <a href="{% url 'delete_book' book.id %}">
                                                <button class="p-2 text-red-600 hover:bg-red-50 rounded">
                                                    <svg class="w-5 h-5" fill="none" stroke="currentColor"
                                                        viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2"
                                                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M4 7h16" />
                                                    </svg>
                                                </button>
                                            </a>

                                        </div>
                                    </td>

                                </tr>

                                {% empty %}

                                <tr>
                                    <td colspan="4" class="text-center py-6 text-slate-500">
                                        No books found
                                    </td>
                                </tr>

                                {% endfor %}

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </main>

    </div>

</body>

</html>
