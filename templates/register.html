{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - BookKeep Management System</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#3b82f6',
                            secondary: '#1e3a8a',
                            accent: '#f59e0b'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-md">
        <div class="glass-effect shadow-2xl rounded-2xl border border-slate-200 overflow-hidden">

            <!-- HEADER -->
            <div class="bg-brand-secondary p-8 text-center text-white">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 rounded-full mb-4">
                    📚
                </div>
                <h1 class="text-2xl font-bold">Create Account</h1>
                <p class="text-slate-300 mt-2 text-sm">Join BookKeep to manage your library</p>
            </div>

            <!-- FORM -->
            <div class="p-8">

                <!-- ❗ ERROR MESSAGE -->
                {% if error %}
                <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
                    {{ error }}
                </div>
                {% endif %}

                <form action="{% url 'register' %}" method="POST" class="space-y-5">
                    {% csrf_token %}

                    <!-- USERNAME -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                        <input name="username" type="text" placeholder="Enter username" required
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-primary outline-none" />
                    </div>

                    <!-- EMAIL -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                        <input name="email" type="email" placeholder="name@company.com" required
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-primary outline-none" />
                    </div>

                    <!-- PASSWORD -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                        <input name="password" type="password" placeholder="••••••••" required
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-primary outline-none" />
                    </div>

                    <!-- CONFIRM PASSWORD -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Confirm Password</label>
                        <input name="confirm_password" type="password" placeholder="••••••••" required
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-primary outline-none" />
                    </div>

                    <!-- TERMS -->
                    <div class="flex items-start">
                        <input class="h-4 w-4 text-brand-primary border-slate-300 rounded mt-1" name="terms" required
                            type="checkbox" />
                        <label class="ml-2 text-sm text-slate-600">
                            I agree to the Terms of Service
                        </label>
                    </div>

                    <!-- BUTTON -->
                    <button type="submit"
                        class="w-full bg-brand-primary hover:bg-brand-secondary text-white font-bold py-3 rounded-lg transition">
                        Sign Up
                    </button>
                </form>

                <!-- LOGIN LINK -->
                <div class="mt-8 text-center">
                    <p class="text-sm text-slate-600">
                        Already have an account?
                        <a href="{% url 'login' %}" class="font-bold text-brand-primary hover:underline">
                            Log in here
                        </a>
                    </p>
                </div>

            </div>
        </div>

        <!-- FOOTER -->
        <footer class="mt-8 text-center text-slate-400 text-xs">
            <p>© 2023 BookKeep System</p>
        </footer>

    </main>

</body>

</html>
