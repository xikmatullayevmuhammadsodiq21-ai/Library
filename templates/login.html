{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - Book Management System</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-md">

        <!-- HEADER -->
        <header class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-xl mb-4">
                📚
            </div>
            <h1 class="text-3xl font-bold text-slate-800">Welcome Back</h1>
            <p class="text-slate-500 mt-2">Login to your account</p>
        </header>

        <!-- FORM -->
        <section class="bg-white p-8 rounded-2xl shadow-xl">

            <!-- ❗ ERROR MESSAGE -->
            {% if error %}
            <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
                Parol yoki username xato ❌
            </div>
            {% endif %}

            <form action="{% url 'login' %}" method="POST" class="space-y-6">
                {% csrf_token %}

                <!-- USERNAME -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700">Username</label>
                    <input name="username" type="text" placeholder="Enter username" required
                        class="w-full px-4 py-3 mt-1 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>

                <!-- PASSWORD -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700">Password</label>
                    <input name="password" type="password" placeholder="••••••••" required
                        class="w-full px-4 py-3 mt-1 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>

                <!-- BUTTON -->
                <button type="submit"
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                    Sign In
                </button>
            </form>

            <!-- REGISTER -->
            <p class="mt-6 text-center text-sm text-slate-600">
                Don't have an account?
                <a href="{% url 'register' %}" class="text-blue-600 font-semibold hover:underline">
                    Register
                </a>
            </p>

        </section>

    </main>

</body>

</html>
